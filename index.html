<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parking Control</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}

.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#e8f4fd 0%,#dbeafe 100%)}
.lock-card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(59,130,246,0.10)}
.lock-logo{font-size:13px;letter-spacing:0.2em;color:#93c5fd;text-transform:uppercase;margin-bottom:1.5rem;font-weight:600}
.lock-title{font-size:24px;font-weight:700;color:#1e3a5f;margin-bottom:0.4rem}
.lock-sub{font-size:13px;color:#64748b;margin-bottom:2rem}
.pw-field{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;color:#1a1a2e;font-size:14px;padding:11px 14px;border-radius:8px;outline:none;margin-bottom:12px}
.pw-field:focus{border-color:#3b82f6}
.pw-btn{width:100%;background:#3b82f6;color:#fff;border:none;font-size:14px;font-weight:600;padding:12px;border-radius:8px;cursor:pointer;letter-spacing:0.03em}
.pw-btn:hover{background:#2563eb}
.pw-error{font-size:12px;color:#ef4444;margin-top:8px;display:none}

.app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{width:28px;height:28px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center}
.topbar-logo svg{width:16px;height:16px;fill:#fff}
.topbar-title{font-size:15px;font-weight:700;color:#1e3a5f}
.topbar-sub{font-size:11px;color:#94a3b8}
.logout-btn{background:none;border:1px solid #e2e8f0;color:#64748b;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer}
.logout-btn:hover{border-color:#3b82f6;color:#3b82f6}

.content{flex:1;padding:2rem;max-width:1100px;margin:0 auto;width:100%}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:700px){.grid{grid-template-columns:1fr}}

.card{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.card-title{font-size:13px;font-weight:700;color:#3b82f6;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.2rem;display:flex;align-items:center;gap:8px}
.card-title svg{width:14px;height:14px}

.field-group{margin-bottom:1rem}
.field-label{font-size:12px;font-weight:600;color:#475569;margin-bottom:5px;display:block}
.field-input{width:100%;background:#f8fafc;border:1.5px solid #e2e8f0;color:#1a1a2e;font-size:13px;padding:9px 12px;border-radius:8px;outline:none}
.field-input:focus{border-color:#3b82f6;background:#fff}
.plate-row{display:flex;gap:8px}
.plate-city{width:80px;text-transform:uppercase}
.plate-sep{display:flex;align-items:center;color:#cbd5e1;font-weight:700;font-size:16px}

.token-wrap{position:relative}
.token-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:0.05em}

.rules-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.add-rule-btn{background:#3b82f6;color:#fff;border:none;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px}
.add-rule-btn:hover{background:#2563eb}

.rule-block{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:1rem;margin-bottom:0.75rem;position:relative}
.rule-block-title{font-size:11px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.75rem}
.rule-remove{position:absolute;top:10px;right:10px;background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;line-height:1}
.rule-remove:hover{color:#ef4444}

.days-grid{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:0.75rem}
.day-chip{background:#fff;border:1.5px solid #e2e8f0;color:#64748b;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;cursor:pointer;user-select:none;transition:all 0.15s}
.day-chip.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}

.time-mode{display:flex;gap:8px;margin-bottom:0.75rem}
.mode-btn{flex:1;background:#fff;border:1.5px solid #e2e8f0;color:#64748b;font-size:11px;font-weight:600;padding:7px;border-radius:7px;cursor:pointer;text-align:center;transition:all 0.15s}
.mode-btn.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}

.time-inputs{display:flex;align-items:center;gap:8px}
.time-input{background:#fff;border:1.5px solid #e2e8f0;color:#1a1a2e;font-size:13px;padding:7px 10px;border-radius:7px;outline:none;width:100px}
.time-input:focus{border-color:#3b82f6}
.time-sep{font-size:12px;color:#94a3b8;font-weight:600}

.no-rules{text-align:center;padding:2rem 1rem;color:#94a3b8;font-size:13px}

.bottom-bar{background:#fff;border-top:1px solid #e2e8f0;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;bottom:0}
.save-btn{background:#22c55e;color:#fff;border:none;font-size:14px;font-weight:700;padding:11px 32px;border-radius:9px;cursor:pointer;letter-spacing:0.03em}
.save-btn:hover{background:#16a34a}
.status-msg{font-size:13px;font-weight:500;min-height:20px}
.status-ok{color:#22c55e}
.status-err{color:#ef4444}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">Parking Control</div>
    <div class="lock-title">Willkommen zurück</div>
    <div class="lock-sub">Passwort eingeben um fortzufahren</div>
    <input type="password" class="pw-field" id="pwInput" placeholder="Passwort" onkeydown="if(event.key==='Enter')checkPw()" />
    <button class="pw-btn" onclick="checkPw()">Anmelden</button>
    <div class="pw-error" id="pwError">Falsches Passwort</div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div>
        <div class="topbar-title">Parking Control</div>
        <div class="topbar-sub">weichkaese / parking-auto-extend</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Abmelden</button>
  </div>

  <div class="content">
    <div class="grid">

      <div>
        <div class="card">
          <div class="card-title">Fahrzeug & Konto</div>

          <div class="field-group">
            <label class="field-label">Kennzeichen</label>
            <div class="plate-row">
              <input class="field-input plate-city" id="plateCity" placeholder="UL" maxlength="3" />
              <div class="plate-sep">–</div>
              <input class="field-input" id="plateNum" placeholder="KL787" maxlength="8" style="text-transform:uppercase;flex:1" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">E-Mail Adresse</label>
            <input class="field-input" id="emailInput" type="email" placeholder="deine@email.de" />
          </div>
        </div>

        <div class="card" style="margin-top:1.5rem">
          <div class="card-title">GitHub Zugang</div>
          <div class="field-group">
            <label class="field-label">Personal Access Token</label>
            <div class="token-wrap">
              <input class="field-input" id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx" style="padding-right:60px" />
              <button class="token-eye" onclick="toggleToken()">ZEIGEN</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="rules-header">
          <div class="card-title" style="margin:0">Zeitregeln</div>
          <button class="add-rule-btn" onclick="addRule()">+ Neue Regel</button>
        </div>
        <div id="rulesContainer">
          <div class="no-rules" id="noRules">Keine Regeln. Klicke auf "+ Neue Regel".</div>
        </div>
      </div>

    </div>
  </div>

  <div class="bottom-bar">
    <div class="status-msg" id="statusMsg"></div>
    <button class="save-btn" onclick="saveConfig()">Einstellungen speichern</button>
  </div>
</div>

<script>
const PW_HASH='a4eded7a00f5e0e957b6e6b30fba33fd5ac8d06f079c6c7d1df3d15b742bb8b3';
const REPO='weichkaese/parking-auto-extend';
const FILE='config.json';
const DAYS=[{k:'monday',l:'MO'},{k:'tuesday',l:'DI'},{k:'wednesday',l:'MI'},{k:'thursday',l:'DO'},{k:'friday',l:'FR'},{k:'saturday',l:'SA'},{k:'sunday',l:'SO'}];
let ruleCount=0;

async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPw(){
  const h=await sha256(document.getElementById('pwInput').value);
  if(h===PW_HASH){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    loadConfig();
  } else {
    document.getElementById('pwError').style.display='block';
  }
}

function logout(){
  document.getElementById('lockScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pwInput').value='';
}

function toggleToken(){
  const inp=document.getElementById('ghToken');
  const btn=document.querySelector('.token-eye');
  if(inp.type==='password'){inp.type='text';btn.textContent='HIDDEN';}
  else{inp.type='password';btn.textContent='ZEIGEN';}
}

function addRule(data){
  ruleCount++;
  const id=ruleCount;
  const noRules=document.getElementById('noRules');
  if(noRules) noRules.remove();

  const activeDays=data?data.days:['monday','tuesday','wednesday','thursday','friday'];
  const mode=data?data.mode:'fixed';
  const timeFrom=data?data.time_from:'06:00';
  const timeTo=data?data.time_to:'06:30';

  const div=document.createElement('div');
  div.className='rule-block';
  div.id='rule-'+id;
  div.innerHTML=`
    <div class="rule-block-title">Regel ${id}</div>
    <button class="rule-remove" onclick="removeRule(${id})">×</button>
    <div class="days-grid">
      ${DAYS.map(d=>`<div class="day-chip${activeDays.includes(d.k)?' active':''}" data-day="${d.k}" onclick="this.classList.toggle('active')">${d.l}</div>`).join('')}
    </div>
    <div class="time-mode">
      <div class="mode-btn${mode==='fixed'?' active':''}" onclick="setMode(${id},'fixed',this)">Feste Uhrzeit</div>
      <div class="mode-btn${mode==='random'?' active':''}" onclick="setMode(${id},'random',this)">Zufällig zwischen</div>
    </div>
    <div class="time-inputs" id="time-inputs-${id}">
      <input class="time-input" id="time-from-${id}" type="time" value="${timeFrom}" />
      <div class="time-sep" id="time-sep-${id}" style="${mode==='fixed'?'display:none':''}">bis</div>
      <input class="time-input" id="time-to-${id}" type="time" value="${timeTo}" style="${mode==='fixed'?'display:none':''}"/>
    </div>
  `;
  document.getElementById('rulesContainer').appendChild(div);
}

function setMode(id,mode,el){
  el.closest('.time-mode').querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const sep=document.getElementById('time-sep-'+id);
  const timeTo=document.getElementById('time-to-'+id);
  if(mode==='fixed'){sep.style.display='none';timeTo.style.display='none';}
  else{sep.style.display='';timeTo.style.display='';}
}

function removeRule(id){
  document.getElementById('rule-'+id).remove();
  if(document.querySelectorAll('.rule-block').length===0){
    const div=document.createElement('div');
    div.className='no-rules';
    div.id='noRules';
    div.textContent='Keine Regeln. Klicke auf "+ Neue Regel".';
    document.getElementById('rulesContainer').appendChild(div);
  }
}

function getRules(){
  return [...document.querySelectorAll('.rule-block')].map(block=>{
    const id=block.id.split('-')[1];
    const days=[...block.querySelectorAll('.day-chip.active')].map(c=>c.dataset.day);
    const mode=block.querySelector('.mode-btn.active').textContent==='Feste Uhrzeit'?'fixed':'random';
    return{
      days,
      mode,
      time_from:document.getElementById('time-from-'+id).value,
      time_to:document.getElementById('time-to-'+id).value
    };
  });
}

async function loadConfig(){
  const token=document.getElementById('ghToken').value;
  if(!token) return;
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}
    });
    if(!r.ok) return;
    const data=await r.json();
    const cfg=JSON.parse(atob(data.content));
    document.getElementById('plateCity').value=cfg.plate_city||'';
    document.getElementById('plateNum').value=cfg.plate_number||'';
    document.getElementById('emailInput').value=cfg.email||'';
    document.getElementById('rulesContainer').innerHTML='';
    ruleCount=0;
    if(cfg.rules&&cfg.rules.length>0){
      cfg.rules.forEach(r=>addRule(r));
    } else {
      addRule({days:['monday','tuesday','wednesday','thursday','friday'],mode:'random',time_from:'06:00',time_to:'06:30'});
      addRule({days:['saturday'],mode:'random',time_from:'09:00',time_to:'09:30'});
    }
  } catch(e){}
}

async function saveConfig(){
  const token=document.getElementById('ghToken').value;
  if(!token){showStatus('GitHub Token fehlt',false);return;}
  const cfg={
    plate_city:document.getElementById('plateCity').value.toUpperCase(),
    plate_number:document.getElementById('plateNum').value.toUpperCase(),
    email:document.getElementById('emailInput').value,
    rules:getRules()
  };
  try{
    const getR=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json'}
    });
    const getData=await getR.json();
    const putR=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      method:'PUT',
      headers:{Authorization:`token ${token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Config update via dashboard',content:btoa(JSON.stringify(cfg,null,2)),sha:getData.sha})
    });
    if(putR.ok) showStatus('Gespeichert ✓',true);
    else showStatus('Fehler beim Speichern',false);
  } catch(e){showStatus('Verbindungsfehler',false);}
}

function showStatus(msg,ok){
  const el=document.getElementById('statusMsg');
  el.textContent=msg;
  el.className='status-msg '+(ok?'status-ok':'status-err');
  setTimeout(()=>el.textContent='',4000);
}
</script>
</body>
</html>
